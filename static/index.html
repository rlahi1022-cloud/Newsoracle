<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsoracle — 뉴스 공식성 판별</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
:root{
--sky-50:#f0f9ff;--sky-100:#e0f2fe;--sky-200:#bae6fd;--sky-300:#7dd3fc;
--sky-400:#38bdf8;--sky-500:#0ea5e9;--sky-600:#0284c7;--sky-700:#0369a1;
--white:#fff;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;
--gray-700:#334155;--gray-800:#1e293b;--green-50:#f0fdf4;--green-600:#16a34a;
--amber-50:#fffbeb;--red-50:#fef2f2;
--radius:12px;--radius-sm:8px;
--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
--shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
--shadow-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(180deg,var(--sky-50) 0%,var(--white) 40%);min-height:100vh;color:var(--gray-800)}
.container{max-width:800px;margin:0 auto;padding:0 20px}
header{padding:48px 0 32px;text-align:center}
.logo{font-size:28px;font-weight:700;color:var(--sky-600);letter-spacing:-.5px;margin-bottom:6px}
.logo-sub{font-size:14px;color:var(--gray-400);font-weight:400}
.search-box{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:6px;display:flex;gap:6px;margin-bottom:32px;border:1.5px solid var(--sky-200);transition:border-color .2s,box-shadow .2s}
.search-box:focus-within{border-color:var(--sky-400);box-shadow:var(--shadow-lg),0 0 0 3px rgba(56,189,248,.15)}
.search-input{flex:1;border:none;outline:none;font-size:16px;padding:12px 16px;font-family:inherit;color:var(--gray-800);background:transparent}
.search-input::placeholder{color:var(--gray-300)}
.search-btn{background:var(--sky-500);color:var(--white);border:none;border-radius:var(--radius-sm);padding:12px 28px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s,transform .1s;white-space:nowrap}
.search-btn:hover{background:var(--sky-600)}.search-btn:active{transform:scale(.97)}.search-btn:disabled{background:var(--gray-300);cursor:not-allowed}

/* 로딩 */
.loading-wrap{text-align:center;padding:30px 0 50px;display:none}.loading-wrap.active{display:block}
.loading-img-wrap{position:relative;width:280px;height:140px;margin:0 auto 20px;overflow:hidden}
.loading-img{width:280px;animation:float-wave 2.5s ease-in-out infinite}
@keyframes float-wave{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-12px) rotate(1.5deg)}50%{transform:translateY(-4px) rotate(-1deg)}75%{transform:translateY(-14px) rotate(1deg)}}
.loading-text{font-size:15px;color:var(--gray-500);margin-bottom:4px}.loading-step{font-size:13px;color:var(--gray-400)}
.loading-dots{display:inline-block}.loading-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* 요약 바 */
.summary-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--sky-50);border-radius:var(--radius-sm);margin-bottom:20px;border:1px solid var(--sky-100)}
.summary-left{font-size:14px;color:var(--gray-600)}.summary-left strong{color:var(--sky-600);font-weight:600}
.summary-right{display:flex;align-items:center;gap:10px}.summary-time{font-size:13px;color:var(--gray-400)}
.reset-btn{background:none;border:1px solid var(--gray-300);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;color:var(--gray-500);cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:4px}.reset-btn:hover{border-color:var(--sky-400);color:var(--sky-600);background:var(--sky-50)}

/* 카드 */
.results-wrap{display:none}.results-wrap.active{display:block}
.article-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;margin-bottom:12px;border:1px solid var(--gray-100);transition:box-shadow .2s,transform .15s}.article-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.card-title{font-size:16px;font-weight:600;color:var(--gray-800);line-height:1.4;cursor:pointer;flex:1;text-decoration:none}.card-title:hover{color:var(--sky-600)}
.badge{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-verified{background:var(--green-50);color:var(--green-600);border:1px solid rgba(22,163,74,.2)}
.badge-partial{background:var(--amber-50);color:#b45309;border:1px solid rgba(245,158,11,.2)}
.badge-fail{background:var(--red-50);color:#dc2626;border:1px solid rgba(239,68,68,.15)}
.card-source{font-size:13px;color:var(--gray-400);margin-bottom:14px}

/* 게이지 (클릭 가능) */
.gauge-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .15s}.gauge-row:hover{background:var(--gray-50)}
.gauge-label{font-size:12px;color:var(--gray-500);width:48px;flex-shrink:0}
.gauge-track{flex:1;height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden}
.gauge-fill{height:100%;border-radius:3px;transition:width .6s ease}
.gauge-fill-official{background:linear-gradient(90deg,var(--sky-400),var(--sky-600))}
.gauge-fill-reliability{background:linear-gradient(90deg,#22c55e,var(--green-600))}
.gauge-info{display:flex;align-items:center;gap:6px;flex-shrink:0}
.gauge-value{font-size:12px;font-weight:600;color:var(--gray-600);min-width:42px;text-align:right}
.gauge-grade{font-size:11px;padding:2px 6px;border-radius:10px;font-weight:500}
.gauge-expand{font-size:9px;color:var(--gray-400);margin-left:2px}
.grade-very-high{background:#f0fdf4;color:#16a34a}.grade-high{background:#ecfdf5;color:#059669}.grade-medium{background:#fffbeb;color:#b45309}.grade-low{background:#fef2f2;color:#dc2626}.grade-very-low{background:#fef2f2;color:#991b1b}

/* 상세 점수 패널 */
.detail-panel{display:none;margin:2px 0 8px;padding:12px 16px;background:var(--gray-50);border-radius:var(--radius-sm);border-left:3px solid var(--sky-300);font-size:12px;line-height:1.8;color:var(--gray-600)}.detail-panel.open{display:block}
.detail-panel.rel-panel{border-left-color:#22c55e}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.detail-label{color:var(--gray-500)}.detail-val{font-weight:600;font-family:'Courier New',monospace}
.detail-divider{border-top:1px dashed var(--gray-200);margin:6px 0}
.detail-formula{font-size:11px;color:var(--gray-400);padding:6px 10px;background:var(--white);border-radius:4px;margin-top:6px;font-family:'Courier New',monospace;line-height:1.6;word-break:break-all}

/* 판정 근거 */
.card-reason{font-size:13px;color:var(--gray-500);margin-top:10px;padding:10px 14px;background:var(--gray-50);border-radius:var(--radius-sm);line-height:1.5}

/* 메타 + 교차 보도 */
.card-meta{display:flex;align-items:center;gap:16px;margin-top:12px;padding-top:10px;border-top:1px solid var(--gray-100);font-size:12px;color:var(--gray-400)}
.cross-toggle{cursor:pointer;color:var(--sky-600);text-decoration:underline dotted;text-underline-offset:2px;display:flex;align-items:center;gap:3px}.cross-toggle:hover{color:var(--sky-700)}
.cross-arrow{font-size:10px;transition:transform .2s;display:inline-block}.cross-arrow.open{transform:rotate(180deg)}
.cross-panel{margin-top:10px;padding:12px 14px;background:var(--gray-50);border-radius:var(--radius-sm);display:none}.cross-panel.open{display:block}
.cross-section-title{font-size:11px;font-weight:600;color:var(--gray-500);margin-bottom:6px}
.cross-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:var(--gray-600);border-bottom:1px solid var(--gray-100)}.cross-item:last-child{border-bottom:none}
.cross-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}.cross-dot-official{background:var(--sky-500)}.cross-dot-normal{background:var(--gray-300)}
.cross-badge{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--sky-100);color:var(--sky-700)}
.cross-link{color:var(--sky-600);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.cross-link:hover{text-decoration:underline}
.cross-source{font-size:11px;color:var(--gray-400);flex-shrink:0}

/* 페이지네이션 */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:24px 0 48px}
.page-btn{width:36px;height:36px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white);color:var(--gray-600);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .15s}
.page-btn:hover{border-color:var(--sky-300);color:var(--sky-600)}.page-btn.active{background:var(--sky-500);color:var(--white);border-color:var(--sky-500)}.page-btn:disabled{opacity:.4;cursor:not-allowed}
.empty-state{text-align:center;padding:60px 0;display:none}.empty-state.active{display:block}.empty-icon{font-size:48px;margin-bottom:12px}.empty-text{font-size:15px;color:var(--gray-400)}
.error-msg{text-align:center;padding:20px;background:var(--red-50);border-radius:var(--radius-sm);color:#dc2626;font-size:14px;display:none;margin-bottom:20px}.error-msg.active{display:block}
</style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">Newsoracle</div>
        <div class="logo-sub">AI 기반 뉴스 공식성 판별 시스템</div>
    </header>
    <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="검색어를 입력하세요 (예: 악뮤, 삼성전자, 기준금리)" autocomplete="off">
        <button class="search-btn" id="searchBtn" onclick="startSearch()">분석하기</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="loading-wrap" id="loadingWrap">
        <div class="loading-img-wrap">
            <img src="/static/loading.png" class="loading-img" alt="loading">
        </div>
        <div class="loading-text" id="loadingText">뉴스를 수집하고 분석 중입니다<span class="loading-dots"></span></div>
        <div class="loading-step" id="loadingStep">잠시만 기다려주세요</div>
    </div>
    <div class="results-wrap" id="resultsWrap">
        <div class="summary-bar" id="summaryBar"></div>
        <div id="articleList"></div>
        <div class="pagination" id="pagination"></div>
    </div>
    <div class="empty-state" id="emptyState">
        <div class="empty-icon">&#128270;</div>
        <div class="empty-text">검색 결과가 없습니다</div>
    </div>
</div>
<script>
var cjid=null,cpage=1,esrc=null,stimer=null,PS=10;
document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter')startSearch()});
function resetUI(){hideAll();cjid=null;cpage=1;document.getElementById('searchInput').value='';document.getElementById('searchInput').focus()}

async function startSearch(){
    var q=document.getElementById('searchInput').value.trim();
    if(!q)return;
    hideAll();show('loadingWrap');
    document.getElementById('searchBtn').disabled=true;
    if(esrc){esrc.close();esrc=null}
    if(stimer){clearInterval(stimer);stimer=null}
    var sc=0;stimer=setInterval(function(){sc++;uStep(sc)},3000);
    try{
        var res=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});
        var d=await res.json();
        if(d.status==='error'){sErr(d.message);return}
        cjid=d.job_id;cpage=1;
        esrc=new EventSource('/api/stream/'+d.job_id);
        esrc.onmessage=function(e){
            var r=JSON.parse(e.data);
            if(r.status==='processing')return;
            esrc.close();esrc=null;
            if(stimer){clearInterval(stimer);stimer=null}
            document.getElementById('searchBtn').disabled=false;
            if(r.status==='error'){sErr(r.message);return}
            if(r.total===0){hideAll();show('emptyState');return}
            render(r);
        };
        esrc.onerror=function(){esrc.close();esrc=null;if(stimer){clearInterval(stimer);stimer=null}document.getElementById('searchBtn').disabled=false;sErr('서버 연결이 끊어졌습니다.')};
    }catch(err){sErr('서버에 연결할 수 없습니다. python server.py를 실행했는지 확인해주세요.')}
}

function render(d){
    hideAll();show('resultsWrap');
    document.getElementById('summaryBar').innerHTML=
        '<div class="summary-left">"<strong>'+E(d.query)+'</strong>" 총 <strong>'+d.total+'</strong>건 분석 | 오피셜 <strong>'+d.verified_count+'</strong>건</div>'+
        '<div class="summary-right"><span class="summary-time">'+d.elapsed+'초</span><button class="reset-btn" onclick="resetUI()">&#8635; 초기화</button></div>';
    var list=document.getElementById('articleList');list.innerHTML='';
    d.data.forEach(function(item,i){list.innerHTML+=card(item,i)});
    pag(d.page,d.total_pages);
}

function card(it,idx){
    var o=it.official_score||0,r=it.reliability_score||0,v=it.is_verified||false,
        vd=it.verdict||'',em=it.verdict_emoji||'',rs=it.verdict_reason||'',lk=it.originallink||'#',
        cs=it.cluster_size||1,us=it.unique_sources||1,
        sl=it.source_list||[],ra=it.related_articles||[],
        rule=it.rule_score||0,sem=it.semantic_score||0,clf=it.classifier_score||0,agn=it.agency_score||0,
        method=it.score_method||'unknown',hasDom=it.has_official_domain||false,
        avgSim=it.avg_similarity||0;
    var bc='badge-fail',bt=vd;
    if(v){bc='badge-verified';bt='오피셜 검증됨'}
    else if(vd.indexOf('확인')>-1){bc='badge-partial'}
    var rg=relGrade(r);
    var oid='od_'+idx,rid='rd_'+idx,cid='cx_'+idx;

    // 공식성 상세 패널
    var offDetail='<div class="detail-row"><span class="detail-label">규칙 점수 (rule)</span><span class="detail-val">'+rule.toFixed(4)+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">의미 유사도 (semantic)</span><span class="detail-val">'+sem.toFixed(4)+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">분류 점수 (classifier)</span><span class="detail-val">'+clf.toFixed(4)+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">기관 점수 (agency)</span><span class="detail-val">'+agn.toFixed(4)+'</span></div>'+
        '<div class="detail-divider"></div>'+
        '<div class="detail-row"><span class="detail-label">계산 경로</span><span class="detail-val">'+method+'</span></div>';
    if(method==='classifier_included'){
        offDetail+='<div class="detail-formula">'+rule.toFixed(4)+' x 0.30 + '+sem.toFixed(4)+' x 0.10 + '+clf.toFixed(4)+' x 0.40'+(agn>0?' + agn_bonus('+agn.toFixed(4)+' x 0.20)':'')+' = <b>'+o.toFixed(4)+'</b></div>';
    }else{
        offDetail+='<div class="detail-formula">'+rule.toFixed(4)+' x 0.60 + '+sem.toFixed(4)+' x 0.15 + '+agn.toFixed(4)+' x 0.25 = <b>'+o.toFixed(4)+'</b><br>(classifier 저신뢰 → 제외)</div>';
    }

    // 신뢰성 상세 패널
    var relDetail='<div class="detail-row"><span class="detail-label">교차 보도 수</span><span class="detail-val">'+cs+'건 ('+us+'개 출처)</span></div>'+
        '<div class="detail-row"><span class="detail-label">공식 도메인</span><span class="detail-val">'+(hasDom?'포함':'없음')+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">내용 일치도</span><span class="detail-val">'+(avgSim>0?avgSim.toFixed(2):'-')+'</span></div>'+
        '<div class="detail-divider"></div>'+
        '<div class="detail-row"><span class="detail-label">신뢰성 점수</span><span class="detail-val">'+(r*100).toFixed(1)+'%'+(r>=0.999?' (cap)':'')+'</span></div>'+
        '<div class="detail-row"><span class="detail-label">등급</span><span class="detail-val">'+rg.label+'</span></div>';

    // 교차 보도 패널
    var cxHtml='';
    if(ra.length>0){
        cxHtml+='<div class="cross-section-title">관련 보도 ('+ra.length+'건)</div>';
        for(var i=0;i<Math.min(ra.length,5);i++){
            var a=ra[i],isOff=isOffDom(a.domain||'');
            cxHtml+='<div class="cross-item"><span class="cross-dot '+(isOff?'cross-dot-official':'cross-dot-normal')+'"></span><a class="cross-link" href="'+E(a.originallink||'#')+'" target="_blank" rel="noopener">'+E(a.title||'제목 없음')+'</a><span class="cross-source">'+E(a.source||a.domain||'')+'</span>'+(isOff?' <span class="cross-badge">공식</span>':'')+'</div>';
        }
        if(ra.length>5)cxHtml+='<div style="font-size:11px;color:var(--gray-400);margin-top:6px;padding-left:14px">...외 '+(ra.length-5)+'건</div>';
    }else if(sl.length>0){
        cxHtml+='<div class="cross-section-title">보도 출처 ('+sl.length+'개)</div>';
        for(var i=0;i<Math.min(sl.length,5);i++){var isOff=isOffDom(sl[i]);cxHtml+='<div class="cross-item"><span class="cross-dot '+(isOff?'cross-dot-official':'cross-dot-normal')+'"></span><span>'+E(sl[i])+'</span>'+(isOff?' <span class="cross-badge">공식 도메인</span>':'')+'</div>'}
        if(sl.length>5)cxHtml+='<div style="font-size:11px;color:var(--gray-400);margin-top:6px;padding-left:14px">...외 '+(sl.length-5)+'개</div>';
    }else{cxHtml+='<div class="cross-item"><span class="cross-dot cross-dot-normal"></span><span>'+E(it.source||'단독 보도')+'</span></div>'}

    return '<div class="article-card">'+
        '<div class="card-header"><a class="card-title" href="'+E(lk)+'" target="_blank" rel="noopener">'+E(it.title)+'</a><span class="badge '+bc+'">'+em+' '+E(bt)+'</span></div>'+
        '<div class="card-source">'+E(it.source)+'</div>'+
        '<div class="gauge-row" onclick="tog(\''+oid+'\')"><span class="gauge-label">공식성</span><div class="gauge-track"><div class="gauge-fill gauge-fill-official" style="width:'+(o*100)+'%"></div></div><div class="gauge-info"><span class="gauge-value">'+(o*100).toFixed(1)+'%</span><span class="gauge-expand">&#9660;</span></div></div>'+
        '<div class="detail-panel" id="'+oid+'">'+offDetail+'</div>'+
        '<div class="gauge-row" onclick="tog(\''+rid+'\')"><span class="gauge-label">신뢰성</span><div class="gauge-track"><div class="gauge-fill gauge-fill-reliability" style="width:'+(r*100)+'%"></div></div><div class="gauge-info"><span class="gauge-grade '+rg.cls+'">'+rg.label+'</span><span class="gauge-value">'+(r*100).toFixed(1)+'%</span><span class="gauge-expand">&#9660;</span></div></div>'+
        '<div class="detail-panel rel-panel" id="'+rid+'">'+relDetail+'</div>'+
        '<div class="card-reason">'+E(rs)+'</div>'+
        '<div class="card-meta"><span class="cross-toggle" onclick="togCx(\''+cid+'\',this)">교차 보도 '+cs+'건 <span class="cross-arrow">&#9660;</span></span><span>독립 출처 '+us+'개</span>'+(hasDom?'<span style="color:var(--sky-600)">공식 도메인 포함</span>':'')+'</div>'+
        '<div class="cross-panel" id="'+cid+'">'+cxHtml+'</div></div>';
}

function tog(id){document.getElementById(id).classList.toggle('open')}
function togCx(id,el){document.getElementById(id).classList.toggle('open');el.querySelector('.cross-arrow').classList.toggle('open')}
function relGrade(s){var p=s*100;if(p>=90)return{label:'매우 높음',cls:'grade-very-high'};if(p>=70)return{label:'높음',cls:'grade-high'};if(p>=50)return{label:'보통',cls:'grade-medium'};if(p>=30)return{label:'낮음',cls:'grade-low'};return{label:'매우 낮음',cls:'grade-very-low'}}
function isOffDom(d){if(!d)return false;var k=['.go.kr','.or.kr','yna.co.kr','korea.kr'];for(var i=0;i<k.length;i++){if(d.indexOf(k[i])>-1)return true}return false}

function pag(pg,tp){
    if(tp<=1){document.getElementById('pagination').innerHTML='';return}
    var h='<button class="page-btn" onclick="goP('+(pg-1)+')" '+(pg<=1?'disabled':'')+'>&laquo;</button>';
    var s=Math.max(1,pg-2),e=Math.min(tp,pg+2);
    for(var i=s;i<=e;i++)h+='<button class="page-btn '+(i===pg?'active':'')+'" onclick="goP('+i+')">'+i+'</button>';
    h+='<button class="page-btn" onclick="goP('+(pg+1)+')" '+(pg>=tp?'disabled':'')+'>&raquo;</button>';
    document.getElementById('pagination').innerHTML=h;
}

async function goP(p){if(!cjid||p<1)return;cpage=p;try{var res=await fetch('/api/result/'+cjid+'?page='+p+'&page_size='+PS);var d=await res.json();if(d.status==='done'){render(d);window.scrollTo({top:0,behavior:'smooth'})}}catch(err){sErr('페이지 로드 실패')}}

function hideAll(){['loadingWrap','resultsWrap','emptyState','errorMsg'].forEach(function(id){document.getElementById(id).classList.remove('active')})}
function show(id){document.getElementById(id).classList.add('active')}
function sErr(m){hideAll();document.getElementById('errorMsg').textContent=m;document.getElementById('errorMsg').classList.add('active');document.getElementById('searchBtn').disabled=false;if(stimer){clearInterval(stimer);stimer=null}}
function E(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
var steps=['뉴스 기사를 수집하고 있습니다','기사 본문을 크롤링하고 있습니다','텍스트를 전처리하고 있습니다','교차 보도를 검증하고 있습니다','공식성 특징을 추출하고 있습니다','의미 유사도를 분석하고 있습니다','AI 분류 모델이 판별 중입니다','최종 결과를 정리하고 있습니다'];
function uStep(n){document.getElementById('loadingStep').textContent=steps[Math.min(n,steps.length-1)]}
</script>
